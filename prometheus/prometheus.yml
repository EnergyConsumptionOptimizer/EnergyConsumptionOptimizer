global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'user-service'
    static_configs:
      - targets: ['user-service:3000']
    metrics_path: '/metrics'
  - job_name: 'alert-service'
    static_configs:
      - targets: ['alert-service:3000']
    metrics_path: '/metrics'
  - job_name: 'threshold-service'
    static_configs:
      - targets: ['threshold-service:3000']
    metrics_path: '/metrics'
  - job_name: 'forecast-service'
    static_configs:
      - targets: ['forecast-service:3000']
    metrics_path: '/metrics'
