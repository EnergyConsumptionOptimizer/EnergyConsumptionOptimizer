name: eco

# SHARED CONFIGS
x-backend-healthcheck: &backend-healthcheck
  test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:3000/health"]
  interval: 10s
  timeout: 3s
  retries: 3
  start_period: 30s

x-frontend-healthcheck: &frontend-healthcheck
  test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:80/"]
  interval: 10s
  timeout: 3s
  retries: 3
  start_period: 5s

x-logging: &common-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

# ENVIRONMENT BLOCKS
x-otel-env: &otel-env
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
  OTEL_EXPORTER_OTLP_PROTOCOL: "http/json"
  OTEL_TRACES_EXPORTER: "otlp"
  OTEL_METRICS_EXPORTER: "otlp"
  OTEL_LOGS_EXPORTER: "otlp"

x-frontend-env: &frontend-env
  NAME: frontend
  PORT: 80
  OTEL_SERVICE_NAME: "frontend"

x-user-env: &user-env
  NAME: user
  PORT: 3000
  MONGODB_HOST: mongodb
  MONGODB_PORT: 27017
  MONGO_DB: user
  JWT_SECRET_KEY: ${JWT_SECRET_KEY}
  JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
  JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
  RESET_CODE: ${RESET_CODE}
  OTEL_SERVICE_NAME: "user-service"

x-threshold-env: &threshold-env
  NAME: threshold
  PORT: 3000
  MONGODB_HOST: mongodb
  MONGODB_PORT: 27017
  MONGO_DB: threshold
  KAFKA_CLIENT_ID: "threshold-service"
  KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
  KAFKA_GROUP_ID: "threshold-service-group"
  KAFKA_TOPIC_FORECASTS: "forecast-events"
  MONITORING_SERVICE_HOST: monitoring
  MONITORING_SERVICE_PORT: 3000
  OTEL_SERVICE_NAME: "threshold-service"

x-forecast-env: &forecast-env
  NAME: forecast
  PORT: 3000
  MONGODB_HOST: mongodb
  MONGODB_PORT: 27017
  MONGO_DB: forecast
  THRESHOLD_SERVICE_HOST: threshold
  THRESHOLD_SERVICE_PORT: 3000
  MONITORING_SERVICE_HOST: monitoring
  MONITORING_SERVICE_PORT: 3000
  FORECAST_HOUR: ${FORECAST_HOUR:-00}
  FORECAST_MINUTE: ${FORECAST_MINUTE:-5}
  OTEL_SERVICE_NAME: "forecast-service"

x-notification-env: &notification-env
  NAME: notification
  PORT: 3000
  MONGODB_HOST: mongodb
  MONGODB_PORT: 27017
  MONGO_DB: notification
  KAFKA_CLIENT_ID: "notification-service"
  KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
  KAFKA_GROUP_ID: "notification-service-group"
  KAFKA_TOPIC_THRESHOLD_BREACHED: "threshold-events"
  KAFKA_TOPIC_THRESHOLD_BREACHED_DLQ: "notification-dlq"
  OTEL_SERVICE_NAME: "notification-service"

x-monitoring-env: &monitoring-env
  NAME: monitoring
  PORT: 3000
  KAFKA_TOPIC_USER: "user-events"
  KAFKA_TOPIC_MAP: "map-events"
  KAFKA_TOPIC_HOOKUP: "hookup-events"
  INFLUXDB_HOST: influxdb
  INFLUXDB_PORT: 8086
  INFLUX_ORG: ${DOCKER_INFLUXDB_INIT_ORG:-eco}
  INFLUX_BUCKET: ${DOCKER_INFLUXDB_INIT_BUCKET:-monitoring}
  INFLUX_TOKEN: ${DOCKER_INFLUXDB_INIT_ADMIN_TOKEN:?missing TOKEN}
  REDIS_HOST: redis
  REDIS_PORT: 6379
  REDIS_PASSWORD: ${REDIS_PASSWORD:? missing REDIS_PASSWORD}
  REDIS_DB: 0
  USER_SERVICE_HOST: user
  USER_SERVICE_PORT: 3000
  THRESHOLD_SERVICE_HOST: threshold
  THRESHOLD_SERVICE_PORT: 3000
  HOOKUP_SERVICE_HOST: hookup
  HOOKUP_SERVICE_PORT: 3000
  MAP_SERVICE_HOST: map
  MAP_SERVICE_PORT: 3000
  TZ: ${TZ:-Europe/Berlin}
  OTEL_SERVICE_NAME: "monitoring-service"

x-map-env: &map-env
  NAME: map
  PORT: 3000
  MONGODB_HOST: mongodb
  MONGODB_PORT: 27017
  MONGO_DB: map
  USER_SERVICE_HOST: user
  USER_SERVICE_PORT: 3000
  OTEL_SERVICE_NAME: "map-service"

x-hookup-env: &hookup-env
  NAME: hookup
  PORT: 3000
  MONGODB_HOST: mongodb
  MONGODB_PORT: 27017
  MONGO_DB: hookup
  USER_SERVICE_HOST: user
  USER_SERVICE_PORT: 3000
  DEVICE_INGESTION_URL: http://${HOST_IP:-localhost}:${HOST_PORT:-80}
  OTEL_SERVICE_NAME: "hookup-service"

x-influx-env: &influx-env
  DOCKER_INFLUXDB_INIT_MODE: setup
  DOCKER_INFLUXDB_INIT_USERNAME: ${DOCKER_INFLUXDB_INIT_USERNAME:?missing USERNAME}
  DOCKER_INFLUXDB_INIT_PASSWORD: ${DOCKER_INFLUXDB_INIT_PASSWORD:?missing PASSWORD}
  DOCKER_INFLUXDB_INIT_ORG: ${DOCKER_INFLUXDB_INIT_ORG:-eco}
  DOCKER_INFLUXDB_INIT_BUCKET: ${DOCKER_INFLUXDB_INIT_BUCKET:-monitoring}
  DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${DOCKER_INFLUXDB_INIT_ADMIN_TOKEN:?missing TOKEN}
  INFLUXD_LOG_LEVEL: error
  INFLUXD_HTTP_LOG_ENABLED: "false"


services:

  # API-GATEWAY
  traefik:
    container_name: api-gateway
    image: traefik:v3.7.0
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-80}:80"
    networks:
      - internal
      - external
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=eco_internal
      - --entrypoints.web.address=:80
      - --api.insecure=true
      - --ping=true
      - --log.level=INFO

      # OpenTelemetry for correlationid(traceparent)
      - --metrics.otlp=true
      - --metrics.otlp.http.endpoint=http://otel-collector:4318/v1/metrics
      - --tracing.otlp=true
      - --tracing.otlp.http.endpoint=http://otel-collector:4318/v1/traces
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    logging: *common-logging

  # FRONTEND
  frontend:
    container_name: frontend
    image: ghcr.io/energyconsumptionoptimizer/frontend:latest
    restart: unless-stopped
    networks:
      - internal
    environment:
      <<: *frontend-env
    healthcheck: *frontend-healthcheck
    logging: *common-logging
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"
      - "traefik.http.routers.frontend.rule=PathPrefix(`/`)"
      - "traefik.http.routers.frontend.entrypoints=web"


  # NODE.JS SERVICES
  user:
    container_name: user-service
    image: ghcr.io/energyconsumptionoptimizer/user-service:latest
    restart: unless-stopped
    networks:
      - internal
    environment:
      <<: [*user-env, *otel-env]
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck: *backend-healthcheck
    logging: *common-logging
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.user.loadbalancer.server.port=3000"
      - "traefik.http.middlewares.user-strip.stripprefix.prefixes=/user"

      # Shared forward-auth middleware — used by all protected routes across services
      - "traefik.http.middlewares.forward-auth.forwardauth.address=http://user:3000/api/internal/auth/verify"
      - "traefik.http.middlewares.forward-auth.forwardauth.authResponseHeaders=X-User-Id,X-User-Role,X-User-Username"
      - "traefik.http.middlewares.forward-auth.forwardauth.trustForwardHeader=false"
      - "traefik.http.middlewares.forward-auth.forwardauth.maxResponseBodySize=1048576"

      # Public auth endpoints (priority 30 — beat user catch-all @20)
      - "traefik.http.routers.user-public.rule=PathPrefix(`/user/api/auth`)"
      - "traefik.http.routers.user-public.entrypoints=web"
      - "traefik.http.routers.user-public.middlewares=user-strip"
      - "traefik.http.routers.user-public.priority=30"

      # Admin reset-password (public)
      - "traefik.http.routers.user-admin.rule=PathPrefix(`/user/api/admin`)"
      - "traefik.http.routers.user-admin.entrypoints=web"
      - "traefik.http.routers.user-admin.middlewares=user-strip"
      - "traefik.http.routers.user-admin.priority=30"

      # Catch-all protected routes (priority 20 — must beat frontend @auto)
      - "traefik.http.routers.user.rule=Path(`/user`) || PathPrefix(`/user/`)"
      - "traefik.http.routers.user.entrypoints=web"
      - "traefik.http.routers.user.middlewares=user-strip,forward-auth"
      - "traefik.http.routers.user.priority=20"

  threshold:
    container_name: threshold-service
    image: ghcr.io/energyconsumptionoptimizer/threshold-service:latest
    restart: unless-stopped
    networks:
      - internal
    environment:
      <<: [*threshold-env, *otel-env]
    depends_on:
      mongodb:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    healthcheck: *backend-healthcheck
    logging: *common-logging
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.threshold.loadbalancer.server.port=3000"
      - "traefik.http.routers.threshold.rule=PathPrefix(`/threshold/api`)"
      - "traefik.http.routers.threshold.entrypoints=web"
      - "traefik.http.routers.threshold.middlewares=threshold-strip,forward-auth"
      - "traefik.http.middlewares.threshold-strip.stripprefix.prefixes=/threshold"

  notification:
    container_name: notification-service
    image: ghcr.io/energyconsumptionoptimizer/notification-service:latest
    restart: unless-stopped
    networks:
      - internal
    environment:
      <<: [*notification-env, *otel-env]
    depends_on:
      mongodb:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    healthcheck: *backend-healthcheck
    logging: *common-logging
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.notification.loadbalancer.server.port=3000"
      - "traefik.http.routers.notification.rule=PathPrefix(`/notification/api`)"
      - "traefik.http.routers.notification.entrypoints=web"
      - "traefik.http.routers.notification.middlewares=notification-strip,forward-auth"
      - "traefik.http.middlewares.notification-strip.stripprefix.prefixes=/notification"

  monitoring:
    container_name: monitoring-service
    image: ghcr.io/energyconsumptionoptimizer/monitoring-service:latest
    restart: unless-stopped
    networks:
      - internal
    environment:
      <<: [*monitoring-env, *otel-env]
    depends_on:
      influxdb:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    healthcheck: *backend-healthcheck
    logging: *common-logging
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.monitoring.loadbalancer.server.port=3000"
      - "traefik.http.middlewares.monitoring-strip.stripprefix.prefixes=/monitoring"
      - "traefik.http.routers.monitoring-ingest.rule=PathPrefix(`/api/measurements`)"
      - "traefik.http.routers.monitoring-ingest.entrypoints=web"
      - "traefik.http.routers.monitoring-ingest.priority=50"
      - "traefik.http.routers.monitoring-ws-meters.rule=PathPrefix(`/monitoring/utility-meters`)"
      - "traefik.http.routers.monitoring-ws-meters.entrypoints=web"
      - "traefik.http.routers.monitoring-ws-meters.priority=46"
      - "traefik.http.routers.monitoring-ws-meters.middlewares=monitoring-strip"
      - "traefik.http.routers.monitoring-catchall.rule=PathPrefix(`/monitoring`)"
      - "traefik.http.routers.monitoring-catchall.entrypoints=web"
      - "traefik.http.routers.monitoring-catchall.priority=40"
      - "traefik.http.routers.monitoring-catchall.middlewares=monitoring-strip,forward-auth"

  hookup:
    container_name: hookup-service
    image: ghcr.io/energyconsumptionoptimizer/smart-furniture-hookup-service:latest
    restart: unless-stopped
    networks:
      - internal
      - external
    environment:
      <<: [*hookup-env, *otel-env]
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck: *backend-healthcheck
    logging: *common-logging
    extra_hosts:
      - "host.docker.internal:host-gateway"
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.hookup.loadbalancer.server.port=3000"
      - "traefik.http.routers.hookup.rule=PathPrefix(`/hookup/api`)"
      - "traefik.http.routers.hookup.entrypoints=web"
      - "traefik.http.routers.hookup.middlewares=hookup-strip,forward-auth"
      - "traefik.http.middlewares.hookup-strip.stripprefix.prefixes=/hookup"


  # KOTLIN SERVICES
  map:
    container_name: map-service
    image: ghcr.io/energyconsumptionoptimizer/map-service:latest
    restart: unless-stopped
    networks:
      - internal
    environment:
      <<: [*map-env, *otel-env]
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck: *backend-healthcheck
    logging: *common-logging
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.map.loadbalancer.server.port=3000"
      - "traefik.http.routers.map.rule=PathPrefix(`/map/api`)"
      - "traefik.http.routers.map.entrypoints=web"
      - "traefik.http.routers.map.middlewares=map-strip,forward-auth"
      - "traefik.http.middlewares.map-strip.stripprefix.prefixes=/map"

  forecast:
    container_name: forecast-service
    image: ghcr.io/energyconsumptionoptimizer/forecast-service:latest
    restart: unless-stopped
    networks:
      - internal
    environment:
      <<: [*forecast-env, *otel-env]
    depends_on:
      mongodb:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    healthcheck: *backend-healthcheck
    logging: *common-logging
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.forecast.loadbalancer.server.port=3000"
      - "traefik.http.routers.forecast.rule=PathPrefix(`/forecast/api`)"
      - "traefik.http.routers.forecast.entrypoints=web"
      - "traefik.http.routers.forecast.middlewares=forecast-strip,forward-auth"
      - "traefik.http.middlewares.forecast-strip.stripprefix.prefixes=/forecast"
      

# STORAGE
  mongodb:
    container_name: mongodb
    image: mongo:7.0
    command: ["--replSet", "rs0", "--wiredTigerCacheSizeGB", "0.25"]
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand('ping').ok"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - mongodb-data:/data/db
    logging: *common-logging

  mongo-setup:
    container_name: mongo-setup
    image: mongo:7.0
    restart: no
    networks:
      - internal
    depends_on:
      mongodb:
        condition: service_healthy
    command: >
      mongosh --host mongodb:27017 --eval
      "try { rs.status(); } catch(e) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongodb:27017'}]}); }"

  influxdb:
    container_name: influxdb
    image: influxdb:2.7-alpine
    restart: unless-stopped
    networks:
      - internal
    environment:
      <<: *influx-env
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    volumes:
      - influxdb-data:/var/lib/influxdb2
    logging: *common-logging

# INFRASTRUCTURE
  kafka:
    container_name: kafka
    image: confluentinc/cp-kafka:7.9.0
    restart: unless-stopped
    networks:
      - internal
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,CONTROLLER://kafka:29093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: ${KAFKA_CLUSTER_ID:-MkU3OEVBNTcwNTJENDM2Qk}
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging: *common-logging

  kafka-init:
    container_name: kafka-init
    image: confluentinc/cp-kafka:7.9.0
    restart: no
    networks:
      - internal
    depends_on:
      kafka:
        condition: service_healthy
    command: >
      bash -c "
        for topic in measurements threshold-events forecast-events user-events zones hookup-events notification-events map-events notification-dlq threshold-dlq; do
          kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic \$$topic --replication-factor 1 --partitions 1;
        done
      "

  kafka-connect:
    container_name: kafka-connect
    build:
      context: .
      dockerfile_inline: |
        FROM confluentinc/cp-kafka-connect:7.9.0
        RUN rm -f /usr/share/java/kafka/mongo-kafka-connect-*.jar
        RUN confluent-hub install --no-prompt mongodb/kafka-connect-mongodb:2.2.0
    restart: unless-stopped
    networks:
      - internal
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      mongo-setup:
        condition: service_completed_successfully
    environment:
      CONNECT_BOOTSTRAP_SERVERS: kafka:9092
      CONNECT_REST_PORT: 8083
      CONNECT_REST_ADVERTISED_HOST_NAME: kafka-connect
      CONNECT_GROUP_ID: eco-kafka-connect-group
      CONNECT_CONFIG_STORAGE_TOPIC: eco-connect-configs
      CONNECT_OFFSET_STORAGE_TOPIC: eco-connect-offsets
      CONNECT_STATUS_STORAGE_TOPIC: eco-connect-status
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_PLUGIN_PATH: /usr/share/java,/usr/share/confluent-hub-components
    healthcheck:
      test: ["CMD", "curl", "-f", "-s", "http://localhost:8083/"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    logging: *common-logging

  kafka-connect-init:
    container_name: kafka-connect-init
    build:
      context: .
      dockerfile_inline: |
        FROM alpine:3.21
        RUN apk add --no-cache curl jq bash
        COPY kafka-connect/init-connectors.sh /init-connectors.sh
        RUN chmod +x /init-connectors.sh
        CMD ["/bin/bash", "/init-connectors.sh"]
    restart: no
    networks:
      - internal
    depends_on:
      kafka-connect:
        condition: service_healthy
    volumes:
      - ./kafka-connect/configs:/etc/kafka-connect/configs:ro

  redis:
    image: redis:latest
    container_name: redis
    networks:
      - internal
    restart: unless-stopped
    volumes:
      - redis-data:/data
    environment:
      - REDIS_ARGS=--requirepass ${REDIS_PASSWORD:? missing REDIS_PASSWORD} --appendonly yes
    healthcheck:
      test: [ "CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *common-logging

# NETWORKS
networks:
  internal:
    name: eco_internal
    driver: bridge
    internal: true
  external:
    name: eco_external
    driver: bridge

# VOLUMES
volumes:
  mongodb-data:
  influxdb-data:
  kafka-data:
  redis-data:
    driver: local