name: eco

x-service-defs:
  user-service-name: &user-name user
  user-service-port: &user-port 3000
  threshold-service-name: &threshold-name threshold
  threshold-service-port: &threshold-port 3000
  forecast-service-name: &forecast-name forecast
  forecast-service-port: &forecast-port 3000
  frontend-service-name: &frontend-name frontend
  frontend-service-port: &frontend-port 80
  notification-service-name: &notification-name notification
  notification-service-port: &notification-port 3000
  monitoring-service-name: &monitoring-name monitoring
  monitoring-service-port: &monitoring-port 3000
  map-service-name: &map-name map
  map-service-port: &map-port 3000
  smart-furniture-hookup-service-name: &hookup-name hookup
  smart-furniture-hookup-service-port: &hookup-port 3000
  prometheus-name: &prometheus-name prometheus
  prometheus-port: &prometheus-port 9090
  grafana-name: &grafana-name grafana
  grafana-port: &grafana-port 9091
  mongodb-name: &mongodb-name mongodb
  mongodb-port: &mongodb-port 27017
  influxdb-name: &influxdb-name influxdb
  influxdb-port: &influxdb-port 8086

# SHARED CONFIGS
x-backend-healthcheck: &backend-healthcheck
  test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/health"]
  interval: 10s
  timeout: 3s
  retries: 3
  start_period: 30s

x-frontend-healthcheck: &frontend-healthcheck
  test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:80/"]
  interval: 10s
  timeout: 3s
  retries: 3
  start_period: 5s

x-logging: &common-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

# ENVIRONMENT BLOCKS
x-otel-env: &otel-env
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
  OTEL_EXPORTER_OTLP_PROTOCOL: "http/json"
  OTEL_TRACES_EXPORTER: "otlp"
  OTEL_METRICS_EXPORTER: "otlp"
  OTEL_LOGS_EXPORTER: "otlp"

x-frontend-env: &frontend-env
  NAME: *frontend-name
  PORT: *frontend-port
  OTEL_SERVICE_NAME: "frontend"

x-user-env: &user-env
  NAME: *user-name
  PORT: *user-port
  MONGODB_HOST: *mongodb-name
  MONGODB_PORT: *mongodb-port
  MONGO_DB: *user-name
  JWT_SECRET_KEY: ${JWT_SECRET_KEY}
  JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
  JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
  RESET_CODE: ${RESET_CODE}
  OTEL_SERVICE_NAME: "user-service"

x-threshold-env: &threshold-env
  NAME: *threshold-name
  PORT: *threshold-port
  MONGODB_HOST: *mongodb-name
  MONGODB_PORT: *mongodb-port
  MONGO_DB: *threshold-name
  KAFKA_CLIENT_ID: "threshold-service"
  KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
  KAFKA_GROUP_ID: "threshold-service-group"
  KAFKA_TOPIC_FORECASTS: "forecast-events"
  KAFKA_TOPIC_FORECASTS_DLQ: "threshold-dlq"
  MONITORING_SERVICE_HOST: *monitoring-name
  MONITORING_SERVICE_PORT: *monitoring-port
  OTEL_SERVICE_NAME: "threshold-service"

x-forecast-env: &forecast-env
  NAME: *forecast-name
  PORT: *forecast-port
  MONGODB_HOST: *mongodb-name
  MONGODB_PORT: *mongodb-port
  MONGO_DB: *forecast-name
  THRESHOLD_SERVICE_HOST: *threshold-name
  THRESHOLD_SERVICE_PORT: *threshold-port
  MONITORING_SERVICE_HOST: *monitoring-name
  MONITORING_SERVICE_PORT: *monitoring-port
  FORECAST_HOUR: ${FORECAST_HOUR:-00}
  FORECAST_MINUTE: ${FORECAST_MINUTE:-5}
  OTEL_SERVICE_NAME: "forecast-service"

x-notification-env: &notification-env
  NAME: *notification-name
  PORT: *notification-port
  MONGODB_HOST: *mongodb-name
  MONGODB_PORT: *mongodb-port
  MONGO_DB: *notification-name
  KAFKA_CLIENT_ID: "notification-service"
  KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
  KAFKA_GROUP_ID: "notification-service-group"
  KAFKA_TOPIC_THRESHOLD_BREACHED: "threshold-events"
  KAFKA_TOPIC_THRESHOLD_BREACHED_DLQ: "notification-dlq"
  OTEL_SERVICE_NAME: "notification-service"

x-monitoring-env: &monitoring-env
  NAME: *monitoring-name
  PORT: *monitoring-port
  INFLUXDB_HOST: *influxdb-name
  INFLUXDB_PORT: *influxdb-port
  INFLUX_ORG: ${DOCKER_INFLUXDB_INIT_ORG:-eco}
  INFLUX_BUCKET: ${DOCKER_INFLUXDB_INIT_BUCKET:-monitoring}
  INFLUX_TOKEN: ${DOCKER_INFLUXDB_INIT_ADMIN_TOKEN:?missing TOKEN}
  USER_SERVICE_HOST: *user-name
  USER_SERVICE_PORT: *user-port
  THRESHOLD_SERVICE_HOST: *threshold-name
  THRESHOLD_SERVICE_PORT: *threshold-port
  HOOKUP_SERVICE_HOST: *hookup-name
  HOOKUP_SERVICE_PORT: *hookup-port
  MAP_SERVICE_HOST: *map-name
  MAP_SERVICE_PORT: *map-port
  EXTERNAL_API_HOST: ${HOST_IP:-localhost}
  EXTERNAL_API_PORT: ${HOST_PORT:-80}
  TZ: ${TZ:-Europe/Berlin}
  OTEL_SERVICE_NAME: "monitoring-service"

x-map-env: &map-env
  NAME: *map-name
  PORT: *map-port
  MONGODB_HOST: *mongodb-name
  MONGODB_PORT: *mongodb-port
  MONGO_DB: *map-name
  USER_SERVICE_HOST: *user-name
  USER_SERVICE_PORT: *user-port
  OTEL_SERVICE_NAME: "map-service"

x-hookup-env: &hookup-env
  NAME: *hookup-name
  PORT: *hookup-port
  MONGODB_HOST: *mongodb-name
  MONGODB_PORT: *mongodb-port
  MONGO_DB: *hookup-name
  USER_SERVICE_HOST: *user-name
  USER_SERVICE_PORT: *user-port
  MONITORING_SERVICE_HOST: *monitoring-name
  MONITORING_SERVICE_PORT: *monitoring-port
  OTEL_SERVICE_NAME: "hookup-service"

x-influx-env: &influx-env
  DOCKER_INFLUXDB_INIT_MODE: setup
  DOCKER_INFLUXDB_INIT_USERNAME: ${DOCKER_INFLUXDB_INIT_USERNAME:?missing USERNAME}
  DOCKER_INFLUXDB_INIT_PASSWORD: ${DOCKER_INFLUXDB_INIT_PASSWORD:?missing PASSWORD}
  DOCKER_INFLUXDB_INIT_ORG: ${DOCKER_INFLUXDB_INIT_ORG:-eco}
  DOCKER_INFLUXDB_INIT_BUCKET: ${DOCKER_INFLUXDB_INIT_BUCKET:-monitoring}
  DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${DOCKER_INFLUXDB_INIT_ADMIN_TOKEN:?missing TOKEN}
  INFLUXD_LOG_LEVEL: error
  INFLUXD_HTTP_LOG_ENABLED: "false"


services:

  # API-GATEWAY
  traefik:
    container_name: api-gateway
    image: traefik:v3.7.0
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-80}:80"
    networks:
      - internal
      - external
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=eco_internal
      - --entrypoints.web.address=:80
      - --api.insecure=true
      - --ping=true
      - --log.level=INFO

      # OpenTelemetry for correlationid(traceparent)
      - --metrics.otlp=true
      - --metrics.otlp.http.endpoint=http://otel-collector:4318/v1/metrics
      - --tracing.otlp=true
      - --tracing.otlp.http.endpoint=http://otel-collector:4318/v1/traces
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    logging: *common-logging

  # FRONTEND
  frontend:
    container_name: frontend
    image: ghcr.io/energyconsumptionoptimizer/frontend:latest
    restart: unless-stopped
    networks:
      - internal
    environment:
      <<: *frontend-env
    healthcheck: *frontend-healthcheck
    logging: *common-logging
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"
      - "traefik.http.routers.frontend.rule=PathPrefix(`/`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.routers.frontend.service=frontend"


  # NODE.JS SERVICES
  user:
    container_name: user-service
    image: ghcr.io/energyconsumptionoptimizer/user-service:latest
    restart: unless-stopped
    networks:
      - internal
    environment:
      <<: [*user-env, *otel-env]
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck: *backend-healthcheck
    logging: *common-logging
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.user.loadbalancer.server.port=3000"
      
      # Public auth endpoints (Priority 30)
      - "traefik.http.routers.user-public.rule=PathPrefix(`/user/api/auth`)"
      - "traefik.http.routers.user-public.entrypoints=web"
      - "traefik.http.routers.user-public.middlewares=user-strip"
      - "traefik.http.routers.user-public.priority=30"
      - "traefik.http.routers.user-public.service=user"
      
      # Admin reset-password
      - "traefik.http.routers.user-admin.rule=PathPrefix(`/user/api/admin`)"
      - "traefik.http.routers.user-admin.entrypoints=web"
      - "traefik.http.routers.user-admin.middlewares=user-strip"
      - "traefik.http.routers.user-admin.priority=30"
      - "traefik.http.routers.user-admin.service=user"
      
      # Catch-all protected routes (Priority 20 — must beat frontend@15)
      - "traefik.http.routers.user.rule=Path(`/user`) || PathPrefix(`/user/`)"
      - "traefik.http.routers.user.entrypoints=web"
      - "traefik.http.routers.user.middlewares=user-strip,forward-auth"
      - "traefik.http.routers.user.priority=20"
      
      # Middlewares
      - "traefik.http.middlewares.user-strip.stripprefix.prefixes=/user"
      - "traefik.http.middlewares.forward-auth.forwardauth.address=http://user:3000/api/internal/auth/verify"
      - "traefik.http.middlewares.forward-auth.forwardauth.authResponseHeaders=X-User-Id,X-User-Role,X-User-Username"
      - "traefik.http.middlewares.forward-auth.forwardauth.trustForwardHeader=false"
      - "traefik.http.middlewares.forward-auth.forwardauth.maxResponseBodySize=1048576"

  threshold:
    container_name: threshold-service
    image: ghcr.io/energyconsumptionoptimizer/threshold-service:latest
    restart: unless-stopped
    networks:
      - internal
    environment:
      <<: [*threshold-env, *otel-env]
    depends_on:
      mongodb:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    healthcheck: *backend-healthcheck
    logging: *common-logging
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.threshold.loadbalancer.server.port=3000"
      - "traefik.http.routers.threshold.rule=PathPrefix(`/threshold`)"
      - "traefik.http.routers.threshold.entrypoints=web"
      - "traefik.http.routers.threshold.middlewares=threshold-strip,forward-auth"
      - "traefik.http.middlewares.threshold-strip.stripprefix.prefixes=/threshold"

  notification:
    container_name: notification-service
    image: ghcr.io/energyconsumptionoptimizer/notification-service:latest
    restart: unless-stopped
    networks:
      - internal
    environment:
      <<: [*notification-env, *otel-env]
    depends_on:
      mongodb:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    healthcheck: *backend-healthcheck
    logging: *common-logging
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.notification.loadbalancer.server.port=3000"
      - "traefik.http.routers.notification.rule=PathPrefix(`/notification`)"
      - "traefik.http.routers.notification.entrypoints=web"
      - "traefik.http.routers.notification.middlewares=notification-strip,forward-auth"
      - "traefik.http.middlewares.notification-strip.stripprefix.prefixes=/notification"

  monitoring:
    container_name: monitoring-service
    image: ghcr.io/energyconsumptionoptimizer/monitoring-service:latest
    restart: unless-stopped
    networks:
      - internal
      - external
    environment:
      <<: [*monitoring-env, *otel-env]
    depends_on:
      influxdb:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    healthcheck: *backend-healthcheck
    logging: *common-logging
    extra_hosts:
      - "host.docker.internal:host-gateway"
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.monitoring.loadbalancer.server.port=3000"
      - "traefik.http.routers.monitoring.rule=PathPrefix(`/monitoring`)"
      - "traefik.http.routers.monitoring.entrypoints=web"
      - "traefik.http.routers.monitoring.middlewares=monitoring-strip,forward-auth"
      - "traefik.http.middlewares.monitoring-strip.stripprefix.prefixes=/monitoring"

  hookup:
    container_name: hookup-service
    image: ghcr.io/energyconsumptionoptimizer/smart-furniture-hookup-service:latest
    restart: unless-stopped
    networks:
      - internal
    environment:
      <<: [*hookup-env, *otel-env]
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck: *backend-healthcheck
    logging: *common-logging
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.hookup.loadbalancer.server.port=3000"
      - "traefik.http.routers.hookup.rule=PathPrefix(`/hookup`)"
      - "traefik.http.routers.hookup.entrypoints=web"
      - "traefik.http.routers.hookup.middlewares=hookup-strip,forward-auth"
      - "traefik.http.middlewares.hookup-strip.stripprefix.prefixes=/hookup"


  # KOTLIN SERVICES
  map:
    container_name: map-service
    image: ghcr.io/energyconsumptionoptimizer/map-service:latest
    restart: unless-stopped
    networks:
      - internal
    environment:
      <<: [*map-env, *otel-env]
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck: *backend-healthcheck
    logging: *common-logging
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.map.loadbalancer.server.port=3000"
      - "traefik.http.routers.map.rule=PathPrefix(`/map`)"
      - "traefik.http.routers.map.entrypoints=web"
      - "traefik.http.routers.map.middlewares=map-strip,forward-auth"
      - "traefik.http.middlewares.map-strip.stripprefix.prefixes=/map"

  forecast:
    container_name: forecast-service
    image: ghcr.io/energyconsumptionoptimizer/forecast-service:latest
    restart: unless-stopped
    networks:
      - internal
    environment:
      <<: [*forecast-env, *otel-env]
    depends_on:
      mongodb:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    healthcheck: *backend-healthcheck
    logging: *common-logging
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.forecast.loadbalancer.server.port=3000"
      - "traefik.http.routers.forecast.rule=PathPrefix(`/forecast`)"
      - "traefik.http.routers.forecast.entrypoints=web"
      - "traefik.http.routers.forecast.middlewares=forecast-strip,forward-auth"
      - "traefik.http.middlewares.forecast-strip.stripprefix.prefixes=/forecast"
      

# STORAGE
  mongodb:
    container_name: mongodb
    image: mongo:7.0
    command: ["--replSet", "rs0"]
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand('ping').ok"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - mongodb-data:/data/db
    logging: *common-logging

  mongo-setup:
    container_name: mongo-setup
    image: mongo:7.0
    restart: no
    networks:
      - internal
    depends_on:
      mongodb:
        condition: service_healthy
    command: >
      mongosh --host mongodb:27017 --eval
      "try { rs.status(); } catch(e) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongodb:27017'}]}); }"

  influxdb:
    container_name: influxdb
    image: influxdb:2.7-alpine
    restart: unless-stopped
    networks:
      - internal
    environment:
      <<: *influx-env
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    volumes:
      - influxdb-data:/var/lib/influxdb2
    logging: *common-logging

# INFRASTRUCTURE
  kafka:
    container_name: kafka
    image: confluentinc/cp-kafka:7.9.0
    restart: unless-stopped
    networks:
      - internal
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,CONTROLLER://kafka:29093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: ${KAFKA_CLUSTER_ID:-MkU3OEVBNTcwNTJENDM2Qk}
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging: *common-logging

  kafka-init:
    container_name: kafka-init
    image: confluentinc/cp-kafka:7.9.0
    restart: no
    networks:
      - internal
    depends_on:
      kafka:
        condition: service_healthy
    command: >
      bash -c "
        for topic in measurements threshold-events forecast-events user-events zones hookup-events notification-events map-events notification-dlq threshold-dlq; do
          kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic \$$topic --replication-factor 1 --partitions 1;
        done;
        for ctopic in eco-connect-configs eco-connect-offsets eco-connect-status; do
          kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic \$$ctopic --replication-factor 1 --partitions 1 --config cleanup.policy=compact;
        done
      "

  kafka-connect:
    container_name: kafka-connect
    build:
      context: .
      dockerfile_inline: |
        FROM confluentinc/cp-kafka-connect:7.9.0
        RUN rm -f /usr/share/java/kafka/mongo-kafka-connect-*.jar
        RUN confluent-hub install --no-prompt mongodb/kafka-connect-mongodb:2.2.0
    restart: unless-stopped
    networks:
      - internal
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      mongo-setup:
        condition: service_completed_successfully
    environment:
      CONNECT_BOOTSTRAP_SERVERS: kafka:9092
      CONNECT_REST_PORT: 8083
      CONNECT_REST_ADVERTISED_HOST_NAME: kafka-connect
      CONNECT_GROUP_ID: eco-kafka-connect-group
      CONNECT_CONFIG_STORAGE_TOPIC: eco-connect-configs
      CONNECT_OFFSET_STORAGE_TOPIC: eco-connect-offsets
      CONNECT_STATUS_STORAGE_TOPIC: eco-connect-status
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_PLUGIN_PATH: /usr/share/java,/usr/share/confluent-hub-components
    healthcheck:
      test: ["CMD", "curl", "-f", "-s", "http://localhost:8083/"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    logging: *common-logging

  kafka-connect-init:
    container_name: kafka-connect-init
    build:
      context: .
      dockerfile_inline: |
        FROM alpine:3.21
        RUN apk add --no-cache curl jq bash
        COPY kafka-connect/init-connectors.sh /init-connectors.sh
        RUN chmod +x /init-connectors.sh
        CMD ["/bin/bash", "/init-connectors.sh"]
    restart: no
    networks:
      - internal
    depends_on:
      kafka-connect:
        condition: service_healthy
    volumes:
      - ./kafka-connect/configs:/etc/kafka-connect/configs:ro

# OBSERVABILITY
  prometheus:
    image: prom/prometheus:v3.11.3
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    networks:
      - internal
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 3s
      retries: 3

  grafana:
    image: grafana/grafana:12.0.1
    container_name: grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    networks:
      - internal
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: 'true'
      GF_AUTH_ANONYMOUS_ORG_ROLE: 'Admin'
      GF_SERVER_HTTP_PORT: '9091'
    volumes:
      - ./observability/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./observability/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./observability/grafana/dashboards/json:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:9091/api/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  loki:
    image: grafana/loki:3.6.10
    container_name: loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    networks:
      - internal
    logging: *common-logging

  tempo:
    image: grafana/tempo:2.9.0
    container_name: tempo
    restart: unless-stopped
    command:
      - "-config.file=/etc/tempo/tempo.yaml"
    volumes:
      - ./observability/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo_data:/var/tempo
    networks:
      - internal
    logging: *common-logging
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3200/ready"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.151.0
    container_name: otel-collector
    restart: unless-stopped
    volumes:
      - ./observability/otel-collector/config.yaml:/etc/otelcol-contrib/config.yaml
    ports:
      - "4318:4318"
      - "8889:8889"
    networks:
      - internal
    logging: *common-logging

# NETWORKS
networks:
  internal:
    name: eco_internal
    driver: bridge
    internal: true
  external:
    name: eco_external
    driver: bridge

# VOLUMES
volumes:
  mongodb-data:
  influxdb-data:
  kafka-data:
  prometheus_data:
  grafana_data:
  tempo_data: