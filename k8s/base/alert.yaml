apiVersion: v1
kind: Service
metadata:
  name: alert
  labels:
    app.kubernetes.io/name: alert
spec:
  selector:
    app.kubernetes.io/name: alert
  ports:
    - name: http
      port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alert
  labels:
    app.kubernetes.io/name: alert
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: alert
  template:
    metadata:
      labels:
        app.kubernetes.io/name: alert
    spec:
      containers:
        - name: alert
          image: ghcr.io/energyconsumptionoptimizer/alert-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: eco-config
            - secretRef:
                name: eco-secrets
          env:
            - name: NAME
              value: alert
            - name: PORT
              value: "3000"
            - name: MONGO_DB
              value: alert
          startupProbe:
            httpGet:
              path: /health
              port: 3000
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3