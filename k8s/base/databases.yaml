apiVersion: v1
kind: Service
metadata:
  name: mongodb
  labels:
    app.kubernetes.io/name: mongodb
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: mongodb
  ports:
    - name: mongodb
      port: 27017
      targetPort: 27017
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  labels:
    app.kubernetes.io/name: mongodb
spec:
  serviceName: mongodb
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mongodb
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mongodb
    spec:
      volumes:
        - name: init-script-volume
          configMap:
            name: mongo-init-script
      containers:
        - name: mongodb
          image: mongo:7.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: mongodb-data
              mountPath: /data/db
            - name: init-script-volume
              mountPath: /docker-entrypoint-initdb.d/mydbinit.js
              subPath: mydbinit.js
          startupProbe:
            exec:
              command: ["mongosh", "--quiet", "--eval", "db.runCommand('ping')"]
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            exec:
              command: ["mongosh", "--quiet", "--eval", "db.runCommand('ping')"]
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command: ["mongosh", "--quiet", "--eval", "db.runCommand('ping')"]
            periodSeconds: 10
            timeoutSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: mongodb-data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: influxdb
  labels:
    app.kubernetes.io/name: influxdb
    app.kubernetes.io/part-of: eco
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: influxdb
  ports:
    - name: http
      port: 8086
      targetPort: 8086
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: influxdb
  labels:
    app.kubernetes.io/name: influxdb
    app.kubernetes.io/part-of: eco
spec:
  serviceName: influxdb
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: influxdb
  template:
    metadata:
      labels:
        app.kubernetes.io/name: influxdb
        app.kubernetes.io/part-of: eco
    spec:
      containers:
        - name: influxdb
          image: influxdb:2.7-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8086
          envFrom:
            - secretRef:
                name: eco-secrets
          env:
            - name: DOCKER_INFLUXDB_INIT_MODE
              value: setup
            - name: INFLUXD_LOG_LEVEL
              value: error
            - name: INFLUXD_HTTP_LOG_ENABLED
              value: "false"
          volumeMounts:
            - name: influxdb-data
              mountPath: /var/lib/influxdb2
          startupProbe:
            httpGet:
              path: /health
              port: 8086
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health
              port: 8086
            periodSeconds: 10
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8086
            periodSeconds: 10
            timeoutSeconds: 3
  volumeClaimTemplates:
    - metadata:
        name: influxdb-data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 5Gi