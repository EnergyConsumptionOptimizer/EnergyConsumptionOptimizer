apiVersion: apps/v1
kind: Deployment
metadata:
  name: alert
spec:
  template:
    spec:
      containers:
        - name: alert
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 10
---
